<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal B2B - Trulink Fiber</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000000; /* Fondo negro */
      color: #d4af37; /* Texto dorado */
      margin: 40px;
    }
    h1, h2 {
      text-align: center;
      color: #d4af37; /* Dorado */
    }
    .box {
      max-width: 500px;
      margin: auto;
      background: rgba(20,20,20,0.9); /* Negro semi-transparente */
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #d4af37; /* Borde dorado */
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #d4af37;
      border-radius: 5px;
      background: #111111;
      color: #d4af37;
    }
    button {
      background: #d4af37; /* Botón dorado */
      color: #000000; /* Texto negro */
      padding: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #ffd700; /* Dorado más brillante */
    }
    .error {
      color: red;
    }
    .hidden {
      display: none;
    }
    .quote {
      margin-top: 20px;
      padding: 10px;
      background: #222222;
      border-radius: 5px;
      border: 1px solid #d4af37;
      color: #d4af37;
    }
  </style>
</head>

      </select>
      <button type="submit">Matricularse</button>
    </form>
    <p id="error" class="error"></p>
  </div>

    </form>
    <div id="resultado" class="quote"></div>
  </div>
