<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Corporativo B2B - Trulink Fiber</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background: #000000; color: #d4af37; margin: 0; padding: 40px; }
    .logo { display: block; margin: 0 auto 20px auto; max-height: 100px; }
    .wrapper { max-width: 600px; margin: auto; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #d4af37; }
    .hidden { display: none; }
    .option-box { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
    .card { border: 1px solid #d4af37; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
    .card:hover { background: #1a1a1a; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #d4af37; color: #d4af37; box-sizing: border-box; }
    button { background: #d4af37; color: #000; padding: 12px; width: 100%; border: none; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <img src="image/logopw.png" alt="Logo" class="logo">

  <div class="wrapper" id="loginView">
    <h2>Acceso Portal B2B</h2>
    <input type="text" id="email" placeholder="Usuario (Email)">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="ejecutarLogin()">ACCEDER</button>
    <p id="error" style="color:red; text-align:center;"></p>
  </div>

  <div class="wrapper hidden" id="selectorView">
    <h2 id="welcomeMsg">Seleccione su operación</h2>
    <div class="option-box">
      <div class="card" onclick="alert('Redirigiendo a Fábrica...')">
        <img src="image/fabrica.png" width="100" alt="Fábrica">
        <p>Fábrica</p>
      </div>
      <div class="card" onclick="alert('Redirigiendo a Producto Terminado...')">
        <img src="image/terminado.png" width="100" alt="Producto Terminado">
        <p>Producto Terminado</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('TU_URL', 'TU_KEY'); // Usa tus credenciales

    window.ejecutarLogin = async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

      if (error) {
        document.getElementById('error').textContent = "Acceso Denegado";
      } else if (email === 'admin@trulinkfiber.com') {
        window.location.href = '/admin/validar';
      } else {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('selectorView').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
