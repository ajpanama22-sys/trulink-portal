<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Corporativo B2B - Trulink Fiber</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background: #000000; color: #d4af37; margin: 0; padding: 40px; }
    h1, h2 { text-align: center; color: #d4af37; }
    .logo { display: block; margin: 0 auto 20px auto; max-height: 100px; }
    
    /* CONTROL DE VISTAS */
    .view { display: none; }
    .active { display: block; }
    
    /* VISTA DE SELECCIÓN */
    .selector-container { display: flex; justify-content: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
    .module-box { background: #111; padding: 20px; border: 1px solid #d4af37; border-radius: 12px; width: 350px; text-align: center; }
    .module-box img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    .btn-action { background: #d4af37; color: #000; padding: 15px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }

    /* FORMULARIO (TU CÓDIGO ORIGINAL) */
    .wrapper { display: flex; gap: 20px; max-width: 1100px; margin: auto; flex-wrap: wrap; }
    .box { flex: 1; min-width: 350px; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #d4af37; }
    .lang-selector { position: absolute; top: 20px; right: 20px; }
    .lang-selector select { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 5px; cursor: pointer; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d4af37; border-radius: 6px; background: #111111; color: #d4af37; }
    button { background: #d4af37; color: #000000; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
    .btn-back { background: #444; color: #fff; margin-top: 10px; }
    .error { color: red; font-size: 13px; margin-top: 10px; text-align: center; }
    .info-note { font-size: 12px; color: #aaa; margin-top: 15px; text-align: justify; }
    .terms-box { height: 150px; overflow-y: scroll; background: #111111; border: 1px solid #d4af37; padding: 10px; font-size: 12px; }
    .track-selector { display: flex; margin-bottom: 25px; border: 1px solid #d4af37; border-radius: 6px; overflow: hidden; }
    .track-btn { flex: 1; padding: 10px; background: #111; color: #d4af37; text-align: center; cursor: pointer; font-weight: bold; }
    .track-btn.active { background: #d4af37; color: #000; }
  </style>
</head>
<body>

  <div class="lang-selector">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="es">Español</option><option value="en">English</option><option value="ar">العربية</option>
    </select>
  </div>

  <img src="public/logopw.png" alt="Logo Trulink" class="logo">
  <h1 id="mainTitle">Registro Corporativo B2B - Trulink Fiber</h1>

  <div id="viewSelector" class="view active">
    <h2>Bienvenido. Gracias por la confianza depositada en la calidad de nuestros productos.</h2>
    <div class="selector-container">
      <div class="module-box">
        <img src="public/fabrica.png" alt="Fábrica">
        <button class="btn-action" onclick="showForm('Fábrica')">ACCEDER A FÁBRICA</button>
      </div>
      <div class="module-box">
        <img src="public/terminado.png" alt="Producto Terminado">
        <button class="btn-action" onclick="showForm('Producto Terminado')">ACCEDER A PRODUCTO TERMINADO</button>
      </div>
    </div>
  </div>

  <div id="viewForm" class="view">
    <div class="wrapper">
      <div class="box">
        <h2>Acceso Portal B2B</h2>
        <div class="form-group"><label>Usuario</label><input type="text" id="loginUser"></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass"></div>
        <button onclick="handleLogin()">ACCEDER</button>
        <button class="btn-action btn-back" onclick="goBack()">VOLVER ATRÁS</button>
        <p id="loginError" class="error"></p>
      </div>

      <div class="box">
        <div class="track-selector">
          <div id="btnClient" class="track-btn active" onclick="setTrack('client')">Cliente B2B</div>
          <div id="btnInvestor" class="track-btn" onclick="setTrack('investor')">Inversor Estratégico</div>
        </div>
        <form id="registerForm">
          <h2 id="sectionCompanyTitle">Información de la Empresa</h2>
          <div class="form-group"><label>Nombre o Razón Social</label><input type="text" name="empresa" required></div>
          <div class="form-group"><label>Identificación Fiscal</label><input type="text" name="fiscal_id" required></div>
          <button type="submit" id="submitBtn">Enviar Solicitud</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient('https://gnaayfvoncyubofydcqj.supabase.co', '...');

    function showForm(modulo) {
      document.getElementById('viewSelector').classList.remove('active');
      document.getElementById('viewForm').classList.add('active');
    }

    function goBack() {
      document.getElementById('viewForm').classList.remove('active');
      document.getElementById('viewSelector').classList.add('active');
    }

    async function handleLogin() {
      const email = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) document.getElementById("loginError").textContent = "Error de acceso";
      else alert("Login exitoso");
    }

    // Aquí irían tus funciones setTrack, changeLanguage y el eventListener del submit.
  </script>
</body>
</html>
