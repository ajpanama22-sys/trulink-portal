<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Corporativo B2B - Trulink Fiber</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background: #000000; color: #d4af37; margin: 0; padding: 40px; }
    h1, h2 { text-align: center; color: #d4af37; }
    .logo { display: block; margin: 0 auto 20px auto; max-height: 100px; }
    /* Estructura del Layout */
    .wrapper { display: flex; gap: 20px; max-width: 1100px; margin: auto; flex-wrap: wrap; }
    .box { flex: 1; min-width: 350px; background: rgba(20,20,20,0.95); padding: 30px; border-radius: 12px; border: 1px solid #d4af37; }
    .lang-selector { position: absolute; top: 20px; right: 20px; }
    .lang-selector select { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 5px; cursor: pointer; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d4af37; border-radius: 6px; background: #111111; color: #d4af37; font-size: 14px; }
    button { background: #d4af37; color: #000000; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; font-size: 15px; }
    button:disabled { background: #555; color: #999; cursor: not-allowed; }
    .error { color: red; font-size: 13px; margin-top: 10px; text-align: center; }
    .terms-box { height: 200px; overflow-y: scroll; background: #111111; border: 1px solid #d4af37; padding: 10px; margin-bottom: 10px; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Selector de idioma -->
  <div class="lang-selector">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="es">Español</option>
      <option value="en">English</option>
      <option value="ar">العربية</option>
    </select>
  </div>

  <img src="image/logopw.png" alt="Logo Trulink Fiber" class="logo">
  <h1 data-key="main_title">Registro Corporativo B2B - Trulink Fiber</h1>

  <div class="wrapper">
    <!-- Bloque de Login (Izquierda) -->
    <div class="box">
      <h2 data-key="login_title">Acceso Portal B2B</h2>
      <div class="form-group"><label data-key="user_label">Usuario</label><input type="text" id="loginUser"></div>
      <div class="form-group"><label data-key="pass_label">Contraseña</label><input type="password" id="loginPass"></div>
      <button onclick="handleLogin()" data-key="login_btn">Acceder</button>
      <p id="loginError" class="error"></p>
    </div>

    <!-- Bloque de Formulario Original -->
    <div class="box">
      <form action="https://formspree.io/f/maqgagep" method="POST" id="registerForm" enctype="multipart/form-data">
        <h2 data-key="company_info">Información de la Empresa</h2>
        <div class="form-group"><label data-key="comp_name">Nombre o Razón Social</label><input type="text" name="empresa" required></div>
        <div class="form-group"><label data-key="fiscal_id">Identificación Fiscal (RUC / NIT / EIN)</label><input type="text" name="fiscal_id" required></div>
        <div class="form-group"><label data-key="website">Sitio Web Corporativo</label><input type="url" name="website" placeholder="https://www.empresa.com" required></div>
        <div class="form-group"><label data-key="industry">Industria / Sector</label><input type="text" name="industria" required></div>
        <div class="form-group"><label data-key="billing">Dirección de Facturación</label><textarea name="direccion" required></textarea></div>

        <h2 data-key="contact_info">Información del Contacto</h2>
        <div class="form-group"><label data-key="rep_name">Nombre Completo del Representante</label><input type="text" name="representante" required></div>
        <div class="form-group"><label data-key="cargo">Cargo en la Empresa</label><input type="text" name="cargo" required></div>
        <div class="form-group"><label data-key="email_label">Correo Electrónico Corporativo</label><input type="email" name="email" id="email" required></div>
        <div class="form-group"><label data-key="tel_label">Teléfono Fijo o Móvil de Empresa</label><input type="text" name="telefono" required></div>
        <div class="form-group"><label data-key="doc_label">Documentación de Soporte</label><input type="file" name="documento" required></div>

        <h2 data-key="terms_title">Términos y Condiciones</h2>
        <div class="terms-box" id="termsText"></div>
        <div class="form-group">
          <input type="checkbox" id="terms" required>
          <label for="terms" data-key="terms_checkbox">He leído y acepto los Términos y Condiciones.</label>
        </div>
        <button type="submit" id="submitBtn" disabled data-key="submit">Enviar Solicitud</button>
        <p id="error" class="error"></p>
      </form>
    </div>
  </div>

  <script>
    const t = {
      es: { main_title: "Registro Corporativo B2B - Trulink Fiber", login_title: "Acceso Portal B2B", user_label: "Usuario", pass_label: "Contraseña", login_btn: "Acceder", denied: "ACCESO DENEGADO", company_info: "Información de la Empresa", comp_name: "Nombre o Razón Social", fiscal_id: "Identificación Fiscal (RUC / NIT / EIN)", website: "Sitio Web Corporativo", industry: "Industria / Sector", billing: "Dirección de Facturación", contact_info: "Información del Contacto", rep_name: "Nombre Completo del Representante", cargo: "Cargo en la Empresa", email_label: "Correo Electrónico Corporativo", tel_label: "Teléfono Fijo o Móvil de Empresa", doc_label: "Documentación de Soporte", terms_title: "Términos y Condiciones", terms_text: "Información legal detallada...", terms_checkbox: "Acepto Términos y Condiciones.", submit: "Enviar Solicitud", error_text: "Use un correo corporativo." },
      en: { main_title: "B2B Corporate Registration - Trulink Fiber", login_title: "B2B Portal Access", user_label: "Username", pass_label: "Password", login_btn: "Login", denied: "ACCESS DENIED", company_info: "Company Information", comp_name: "Company Name", fiscal_id: "Tax ID (RUC / NIT / EIN)", website: "Corporate Website", industry: "Industry / Sector", billing: "Billing Address", contact_info: "Contact Information", rep_name: "Representative Name", cargo: "Job Title", email_label: "Corporate Email", tel_label: "Business Phone", doc_label: "Supporting Documentation", terms_title: "Terms and Conditions", terms_text: "Detailed legal information...", terms_checkbox: "I accept Terms and Conditions.", submit: "Submit Application", error_text: "Use a corporate email." },
      ar: { main_title: "استمارة التسجيل للشركات (B2B)", login_title: "دخول بوابة B2B", user_label: "اسم المستخدم", pass_label: "كلمة المرور", login_btn: "دخول", denied: "تم رفض الوصول", company_info: "معلومات الشركة", comp_name: "اسم الشركة", fiscal_id: "الرقم الضريبي", website: "الموقع الإلكتروني", industry: "القطاع", billing: "عنوان الفواتير", contact_info: "معلومات الاتصال", rep_name: "الاسم الكامل للممثل", cargo: "المسمى الوظيفي", email_label: "البريد الإلكتروني للعمل", tel_label: "هاتف الشركة", doc_label: "وثائق الدعم", terms_title: "الشروط والأحكام", terms_text: "معلومات قانونية مفصلة...", terms_checkbox: "أوافق على الشروط والأحكام.", submit: "إرسال الطلب", error_text: "يجب استخدام بريد إلكتروني خاص بالعمل." }
    };

    function changeLanguage() {
      const lang = document.getElementById("languageSelect").value;
      document.querySelectorAll("[data-key]").forEach(el => { el.textContent = t[lang][el.getAttribute("data-key")]; });
      document.getElementById("termsText").innerHTML = t[lang].terms_text;
      document.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    }

    function handleLogin() { document.getElementById("loginError").textContent = t[document.getElementById("languageSelect").value].denied; }

    document.getElementById("terms").addEventListener("change", function() { document.getElementById("submitBtn").disabled = !this.checked; });
    
    changeLanguage();
  </script>
</body>
</html>
