<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Selección de Operaciones - Trulink Fiber</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background: #000000; color: #d4af37; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .logo { max-height: 100px; margin-bottom: 40px; }
    h1 { color: #d4af37; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
    .selector-wrapper { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
    .card { background: rgba(20, 20, 20, 0.95); padding: 20px; border: 1px solid #d4af37; border-radius: 12px; text-align: center; cursor: pointer; transition: transform 0.3s, border 0.3s; width: 300px; }
    .card:hover { transform: scale(1.05); border: 2px solid #d4af37; }
    .card img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    .card h2 { color: #d4af37; margin: 10px 0; }
  </style>
</head>
<body>

  <img src="image/logo.png" alt="Logo Trulink Fiber" class="logo">
  <h1>Seleccione su flujo de operación</h1>

  <div class="selector-wrapper">
    <!-- Opción Fábrica -->
    <div class="card" onclick="window.location.href='fabrica.html'">
      <img src="image/fabrica.png" alt="Fábrica">
      <h2>Fábrica</h2>
    </div>

    <!-- Opción Producto Terminado -->
    <div class="card" onclick="window.location.href='terminado.html'">
      <img src="image/terminado.png" alt="Producto Terminado">
      <h2>Producto Terminado</h2>
    </div>
  </div>

</body>
</html>
